name: Build and commit artifacts

on:
  workflow_dispatch:
    inputs:
      defold_version:
        description: Defold release tag, or latest for the latest stable version.
        required: false
        default: latest
        type: string
  workflow_call:
    inputs:
      defold_version:
        description: Defold release tag, or latest for the latest stable version.
        required: false
        default: latest
        type: string

permissions:
  contents: write

concurrency:
  group: build-and-commit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-commit:
    name: Build and commit artifacts
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout calling branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'
          architecture: x64

      - name: Download bob.jar
        id: bob
        shell: bash
        env:
          DEFOLD_VERSION_INPUT: ${{ inputs.defold_version || 'latest' }}
        run: |
          set -euo pipefail

          if [ "${DEFOLD_VERSION_INPUT}" = "latest" ]; then
            DEFOLD_SHA1="$(curl -fsSL https://d.defold.com/stable/info.json | jq -r '.sha1')"
            BOB_URL="https://d.defold.com/archive/stable/${DEFOLD_SHA1}/bob/bob.jar"
          else
            BOB_URL="https://github.com/defold/defold/releases/download/${DEFOLD_VERSION_INPUT}/bob.jar"
          fi

          curl -fsSL -o bob.jar "${BOB_URL}"
          java -jar bob.jar --version
          DEFOLD_VERSION="$(java -jar bob.jar --version | awk '{print $5}')"
          echo "defold_version=${DEFOLD_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install shared library dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenal-dev freeglut3-dev libgl-dev libglx-dev libegl-dev

      - name: Resolve libraries
        run: java -jar bob.jar resolve

      - name: Run build.sh
        env:
          DEFOLDSDK: ${{ steps.bob.outputs.defold_version }}
        run: ./build.sh

      - name: Commit generated artifacts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add defold-spine/lib defold-spine/plugins
          if git diff --cached --quiet; then
            echo "No generated artifact changes to commit."
            exit 0
          fi
          git commit -m "Build Defold artifacts (${{ steps.bob.outputs.defold_version }})"
          git push origin "HEAD:${GITHUB_REF_NAME}"
